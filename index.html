<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crunchy Creations Studio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="home-main">
      <div class="home-container">
        <header class="home-header">
          <div>
            <h1>Crunchy Creations</h1>
          </div>
        </header>

        <section>
          <div id="homeProjects"></div>
        </section>
      </div>
    </main>

    <div id="nameModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center;">
      <div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; width: 90%;">
        <h2 style="margin-top: 0; color: #333;">Rename Animation</h2>
        <input id="nameInput" type="text" placeholder="Enter animation name" style="width: 100%; padding: 10px; font-size: 16px; border: 2px solid #ddd; border-radius: 4px; box-sizing: border-box; margin-bottom: 15px;">
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
          <button id="nameCancel" type="button" style="padding: 8px 16px; background: #ddd; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">Cancel</button>
          <button id="nameConfirm" type="button" style="padding: 8px 16px; background: #7a5cff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">Confirm</button>
        </div>
      </div>
    </div>

    <div id="deleteModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center;">
      <div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 420px; width: 90%; position: relative;">
        <button id="deleteClose" type="button" style="position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; border-radius: 50%; border: none; background: #eee; color: #333; font-size: 20px; line-height: 1; cursor: pointer;">×</button>
        <h2 style="margin-top: 0; color: #333;">Delete Animation</h2>
        <p id="deleteMessage" style="margin: 0 0 18px 0; color: #555;">Delete this animation?</p>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
          <button id="deleteCancel" type="button" style="padding: 8px 16px; background: #ddd; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">Cancel</button>
          <button id="deleteConfirm" type="button" style="padding: 8px 16px; background: #ff5f7a; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">Delete</button>
        </div>
      </div>
    </div>

    <script>
      let nameModalCallback = null;
      let nameModalData = null;
      let deleteModalCallback = null;

      function showNameModal(title, defaultValue, callback, data) {
        var modal = document.getElementById('nameModal');
        var input = document.getElementById('nameInput');
        var confirmBtn = document.getElementById('nameConfirm');
        var cancelBtn = document.getElementById('nameCancel');
        
        modal.querySelector('h2').textContent = title;
        input.value = defaultValue;
        nameModalCallback = callback;
        nameModalData = data;
        
        modal.style.display = 'flex';
        input.focus();
        input.select();

        function handleConfirm() {
          if (input.value.trim()) {
            nameModalCallback(input.value.trim(), nameModalData);
            modal.style.display = 'none';
          }
        }

        function handleCancel() {
          modal.style.display = 'none';
        }

        confirmBtn.onclick = handleConfirm;
        cancelBtn.onclick = handleCancel;
        input.onkeypress = function(e) {
          if (e.key === 'Enter') handleConfirm();
        };
        input.onkeydown = function(e) {
          if (e.key === 'Escape') handleCancel();
        };
      }

      function showDeleteModal(message, callback) {
        var modal = document.getElementById('deleteModal');
        var msg = document.getElementById('deleteMessage');
        var confirmBtn = document.getElementById('deleteConfirm');
        var cancelBtn = document.getElementById('deleteCancel');
        var closeBtn = document.getElementById('deleteClose');

        if (!modal || !msg || !confirmBtn || !cancelBtn || !closeBtn) {
          return;
        }

        deleteModalCallback = callback;
        msg.textContent = message;
        modal.style.display = 'flex';

        function closeModal() {
          modal.style.display = 'none';
        }

        function confirmDelete() {
          if (deleteModalCallback) {
            deleteModalCallback();
          }
          closeModal();
        }

        confirmBtn.onclick = confirmDelete;
        cancelBtn.onclick = closeModal;
        closeBtn.onclick = closeModal;

        modal.onkeydown = function(e) {
          if (e.key === 'Escape') closeModal();
          if (e.key === 'Enter') confirmDelete();
        };
      }
      function renderHomeProjects() {
        var list = document.getElementById("homeProjects");
        list.innerHTML = "";

        // Create new animation card
        var newCard = document.createElement("div");
        newCard.className = "project-card new-animation-card";
        newCard.style.cursor = "pointer";
        newCard.innerHTML =
          '<div style="display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; font-size: 200px; font-weight: 300; color: #999; line-height: 1;">+</div>';
        newCard.addEventListener("click", function () {
          localStorage.removeItem("mason_current");
          location.href = "studio.html";
        });
        list.appendChild(newCard);

        var ps = JSON.parse(localStorage.getItem("mason_projects") || "[]");
        ps.forEach(function (p) {
          var card = document.createElement("div");
          card.className = "project-card";
          var thumb = document.createElement("div");
          thumb.className = "project-thumb";
          if (p.thumb) {
            var img = document.createElement("img");
            img.src = p.thumb;
            thumb.appendChild(img);
          }
          var titleWrap = document.createElement("div");
          titleWrap.className = "project-info";
          var title = document.createElement("h3");
          title.textContent = p.name || "Animation " + p.id;
          var created = document.createElement("small");
          created.textContent = new Date(
            p.created || Date.now(),
          ).toLocaleString();
          var open = document.createElement("button");
          open.textContent = "Open";
          open.addEventListener("click", function () {
            localStorage.setItem("mason_current", p.id);
            location.href = "studio.html";
          });
          var deleteBtn = document.createElement("button");
          deleteBtn.textContent = "Delete";
          deleteBtn.style.color = "#ff5f7a";
          deleteBtn.addEventListener("click", function () {
            showDeleteModal("Delete this animation?", function() {
              var ps = JSON.parse(
                localStorage.getItem("mason_projects") || "[]",
              );
              ps = ps.filter(function (proj) {
                return proj.id !== p.id;
              });
              localStorage.setItem("mason_projects", JSON.stringify(ps));
              renderHomeProjects();
            });
          });
          var renameBtn = document.createElement("button");
          renameBtn.textContent = "Rename";
          renameBtn.addEventListener("click", function () {
            showNameModal(
              "Rename Animation",
              p.name || "Animation " + p.id,
              function(newName, projectId) {
                var ps = JSON.parse(
                  localStorage.getItem("mason_projects") || "[]",
                );
                for (var i = 0; i < ps.length; i++) {
                  if (ps[i].id === projectId) {
                    ps[i].name = newName;
                    break;
                  }
                }
                localStorage.setItem("mason_projects", JSON.stringify(ps));
                renderHomeProjects();
              },
              p.id
            );
          });
          titleWrap.appendChild(title);
          titleWrap.appendChild(created);
          var actions = document.createElement("div");
          actions.className = "project-actions";
          actions.appendChild(open);
          actions.appendChild(renameBtn);
          actions.appendChild(deleteBtn);
          card.appendChild(thumb);
          card.appendChild(titleWrap);
          card.appendChild(actions);
          list.appendChild(card);
        });
      }
      renderHomeProjects();
    </script>
  </body>
</html>
